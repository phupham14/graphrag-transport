version: '3.8'

services:
  neo4j:
    image: neo4j:5
    container_name: neo4j

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"

    volumes:
      - ./neo4j/data:/data
      - ./neo4j/import:/import